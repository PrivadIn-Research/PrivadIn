# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DAILY_LOG_LIMIT: ${{ secrets.VITE_DAILY_LOG_LIMIT }}
          VITE_SALARY_ENCRYPTION_KEY: ${{ secrets.VITE_SALARY_ENCRYPTION_KEY }}

      - name: Deploy Firebase Hosting and Firestore rules
        env:
          FIREBASE_SERVICE_ACCOUNT_PRIVADIN_D7EBE: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRIVADIN_D7EBE }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_PRIVADIN_D7EBE" > "${{ runner.temp }}/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${{ runner.temp }}/firebase-service-account.json"
          npx firebase-tools@15.18.0 deploy --only hosting,firestore:rules --non-interactive --project=privadin-d7ebe